# agentic.conf — App-specific constants for sherpa-voice
# Sourced by scripts/agentic/_lib.sh

AGENTIC_PORT=7500
AGENTIC_SCHEME="sherpa-voice"
AGENTIC_BUNDLE_BASE="net.siteed.sherpavoice"
AGENTIC_DEFAULT_SIMULATOR="sherpa-voice-1"
AGENTIC_DEFAULT_EMULATOR_SERIAL="emulator-5580"
AGENTIC_DEFAULT_AVD="audiolab"
AGENTIC_ANDROID_EMULATOR_AUTOBOOT=false
AGENTIC_IOS_PHYSICAL_FALLBACK="exit"
AGENTIC_SKIP_BUILD_SUPPORTED=false
AGENTIC_PRE_BUILD_HOOK=""
AGENTIC_METRO_LOG_MODE="tee"
AGENTIC_ANDROID_LOG_FILTER='SherpaOnnx|SherpaOnnxModule|SherpaOnnxTts|SherpaOnnxAsr|SherpaOnnxTurbo|net.siteed.sherpaonnx'
AGENTIC_IOS_LOG_PREDICATE='eventMessage CONTAINS "SherpaOnnx" OR eventMessage CONTAINS "sherpa-onnx"'
AGENTIC_ROUTES='
  /(tabs)/home              Home / system info tab
  /(tabs)/features          Features hub tab
  /(tabs)/models            Model management tab
  /feature/asr              Speech recognition
  /feature/tts              Text-to-speech
  /feature/audio-tagging    Audio tagging
  /feature/speaker-id       Speaker identification
  /feature/kws              Keyword spotting'
