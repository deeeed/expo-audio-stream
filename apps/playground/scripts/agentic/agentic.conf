# agentic.conf — App-specific constants for playground
# Sourced by scripts/agentic/_lib.sh

AGENTIC_PORT=7365
AGENTIC_CDP_PORT=9222
AGENTIC_SCHEME="audioplayground"
AGENTIC_BUNDLE_BASE="net.siteed.audioplayground"
AGENTIC_DEFAULT_SIMULATOR="playground-1"
AGENTIC_DEFAULT_EMULATOR_SERIAL="emulator-5580"
AGENTIC_DEFAULT_AVD="audiolab"
AGENTIC_ANDROID_EMULATOR_AUTOBOOT=true
AGENTIC_IOS_PHYSICAL_FALLBACK="simulator"
AGENTIC_SKIP_BUILD_SUPPORTED=true
AGENTIC_PRE_BUILD_HOOK="yarn build:deps"
AGENTIC_METRO_LOG_MODE="append"
AGENTIC_ANDROID_LOG_FILTER='AudioStudio|AudioTrimmer|AudioDeviceManager|RecordingActionReceiver'
AGENTIC_IOS_LOG_PREDICATE='eventMessage CONTAINS "AudioStudio"'
AGENTIC_ROUTES='
  /(tabs)/record            Record tab (default)
  /(tabs)/import            Import audio files
  /(tabs)/transcription     Transcription
  /(tabs)/files             Recorded files
  /(tabs)/more              More options
  /minimal                  Minimal recording test
  /trim                     Audio trimming
  /decibel                  Decibel meter
  /permissions              Permission settings
  /audio-device-test        Audio device testing'
